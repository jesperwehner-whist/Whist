// ── Point tables ───────────────────────────────────────────────────────────
const BASE = {
almindelig: {8:40,9:60,10:80,11:120,12:180,13:240},
gode:       {8:60,9:80,10:120,11:180,12:240,13:360},
halveGode:  {8:80,9:120,10:180,11:240,12:360,13:420},
};
BASE.halve = BASE.gode;
const OVER  = {almindelig:5, gode:10, halveGode:20};
OVER.halve  = OVER.gode;
const UNDER = {almindelig:-10, gode:-20, halveGode:-40};
UNDER.halve = UNDER.gode;

const SOL_PTS = {
sol:    {win1:180, win2:120, lose1:-180, lose2:-180},
rensol: {win1:240, win2:180, lose1:-240, lose2:-240},
bord:   {win1:360, win2:240, lose1:-360, lose2:-360},
};
const SOL_OPP = {
sol:    {win1:-60,  win2:-120, lose1:60,  lose2:120},
rensol: {win1:-80,  win2:-180, lose1:80,  lose2:180},
bord:   {win1:-120, win2:-240, lose1:120, lose2:240},
};

function roundUp10(n){return Math.ceil(n/10)*10;}
function variantKey(round){
if(round.gameType===“halve”) return round.trump===“♣”?“halveGode”:“halve”;
return round.gameType;
}

function calcRoundPoints(round){
const gt=GAME_TYPES.find(g=>g.id===round.gameType);
if(!gt||!round.declarer) return null;

if(gt.solType){
const coDeclarers=round.coDeclarers||[];
const allDec=[round.declarer,…coDeclarers];
const opponents=PLAYERS.filter(p=>!allDec.includes(p));
const numDec=allDec.length;
const tbl=SOL_PTS[round.gameType];
const oppTbl=SOL_OPP[round.gameType];
if(!tbl) return null;
const maxAllowed=round.gameType===“sol”?1:0;
const solTaken=round.solTaken||{};
const pts={};
PLAYERS.forEach(p=>pts[p]=0);
if(numDec===1){
const taken=solTaken[round.declarer];
if(taken===undefined||taken===””) return null;
const ok=Number(taken)<=maxAllowed;
pts[round.declarer]=ok?tbl.win1:tbl.lose1;
opponents.forEach(p=>pts[p]=ok?oppTbl.win1:oppTbl.lose1);
} else {
allDec.forEach(dec=>{
const taken=solTaken[dec];
if(taken===undefined||taken===””) return;
pts[dec]=Number(taken)<=maxAllowed?tbl.win2:tbl.lose2;
});
const results=allDec.map(dec=>{
const t=solTaken[dec];
return(t===undefined||t===””)?null:Number(t)<=maxAllowed;
});
if(results.every(r=>r===true))  opponents.forEach(p=>pts[p]=oppTbl.win2);
else if(results.every(r=>r===false)) opponents.forEach(p=>pts[p]=oppTbl.lose2);
else opponents.forEach(p=>pts[p]=0);
}
return pts;
}

const bid=parseInt(round.bid);
const taken=parseInt(round.taken);
if(isNaN(bid)||isNaN(taken)||bid<8||bid>13) return null;
const key=variantKey(round);
const base=BASE[key]?.[bid];
if(base===undefined) return null;
const diff=taken-bid;
let decPts;
if(diff>=0){
const extra=diff>0?roundUp10(diff*OVER[key]):0;
decPts=base+extra;
} else {
const short=bid-taken;
decPts=-base-(short*Math.abs(UNDER[key]));
}
const pts={};
PLAYERS.forEach(p=>pts[p]=0);
if(round.partner===“selv”){
pts[round.declarer]=decPts*2;
PLAYERS.filter(p=>p!==round.declarer).forEach(p=>pts[p]=-decPts);
} else if(round.partner){
pts[round.declarer]=decPts;
pts[round.partner]=decPts;
PLAYERS.filter(p=>p!==round.declarer&&p!==round.partner).forEach(p=>pts[p]=-decPts);
} else return null;
return pts;
}

function parseExcelToSessions(workbook){
const sheetName=workbook.SheetNames.find(n=>/result|whist|aften|data/i.test(n))||workbook.SheetNames[0];
const ws=workbook.Sheets[sheetName];
const rows=window.XLSX.utils.sheet_to_json(ws,{defval:””});
if(!rows.length) return [];
const colMap={};const sample=rows[0];
Object.keys(sample).forEach(k=>{const kl=k.toLowerCase().trim();PLAYERS.forEach(p=>{if(kl===p.toLowerCase()||kl.includes(p.toLowerCase()))colMap[p]=k;});});
const dateCol=Object.keys(sample).find(k=>/dato|date|dag|aften/i.test(k));
const sessions=[];
rows.forEach((row,ri)=>{
const hasPoints=PLAYERS.some(p=>colMap[p]&&row[colMap[p]]!==””&&!isNaN(Number(row[colMap[p]])));
if(!hasPoints) return;
let dateStr=dateCol?String(row[dateCol]).trim():””;
if(!dateStr||dateStr===“0”) dateStr=`Importeret række ${ri+1}`;
const points={};
PLAYERS.forEach(p=>{const raw=colMap[p]?row[colMap[p]]:””;points[p]=raw!==””&&!isNaN(Number(raw))?String(Number(raw)):””;});
sessions.push({id:Date.now()+ri+Math.random(),date:dateStr,finished:true,imported:true,
rounds:[{…initRound(),id:Date.now()+ri+0.5,gameType:“almindelig”,points,autoPoints:false}]});
});
return sessions;
}

// ── Session stats calculator ───────────────────────────────────────────────
function calcSessionStats(rounds, roundPtsFn) {
const typeCounts = {};
GAME_TYPES.forEach(g => typeCounts[g.id] = 0);
const declarerCounts = {};
PLAYERS.forEach(p => declarerCounts[p] = 0);
const declarerWins = {};
PLAYERS.forEach(p => declarerWins[p] = 0);
let totalRounds = 0;

rounds.forEach(r => {
if (!r.gameType || !r.declarer) return;
typeCounts[r.gameType] = (typeCounts[r.gameType]||0) + 1;
declarerCounts[r.declarer] = (declarerCounts[r.declarer]||0) + 1;
totalRounds++;
// Check if declarer won (positive points)
const pts = roundPtsFn(r);
if (pts && pts[r.declarer] > 0) declarerWins[r.declarer]++;
});

return { typeCounts, declarerCounts, declarerWins, totalRounds };
}

function startSession(){
// Guess next season+evening from existing sessions
const existing=[…sessions].sort((a,b)=>{
if((a.season||0)!==(b.season||0)) return (b.season||0)-(a.season||0);
return (b.eveningNum||0)-(a.eveningNum||0);
});
const lastSeason = existing[0]?.season||11;
const lastEvening = existing[0]?.eveningNum||0;
const nextEvening = lastEvening>=8?1:lastEvening+1;
const nextSeason = lastEvening>=8?lastSeason+1:lastSeason;
setNewSessionInfo({season:String(nextSeason), evening:String(nextEvening)});
setShowNewSessionModal(true);
}
function confirmStartSession(){
const s=parseInt(newSessionInfo.season)||1;
const e=parseInt(newSessionInfo.evening)||1;
const today=new Date().toLocaleDateString(“da-DK”,{day:“numeric”,month:“long”,year:“numeric”});
setActive({id:Date.now(),date:today,season:s,eveningNum:e,rounds:[initRound()]});
setShowNewSessionModal(false);
setView(“session”);
}

function exportSessionToExcel(session, allSessions){
if(!window.XLSX) return;
const XLSX = window.XLSX;

```
// Build rows matching the original format
const gameTypeLabel=(r)=>{
  const bid = r.bid||"";
  const gt = r.gameType||"";
  const label = {
    "almindelig":"Alm","gode":"Gode","halve":"Halve",
    "sol":"Sol","rensol":"Ren Sol","bord":"Oplægger"
  }[gt]||gt;
  if(gt==="sol"||gt==="rensol"||gt==="bord") return label;
  // Halve Gode
  if(gt==="halve"&&r.trump==="♣") return bid?`${bid} Halve Gode`:"Halve Gode";
  return bid?`${bid} ${label}`:label;
};

const gåetHjem=(r)=>{
  const pts = r.points||{};
  const dec = r.declarer;
  const part = r.partner;
  if(!dec) return "";
  const decPts = parseInt(pts[dec])||0;
  if(part&&part!=="selv"){
    const partPts = parseInt(pts[part])||0;
    if(decPts>0&&partPts>0) return "Ja";
    if(decPts<=0&&partPts<=0) return "Nej";
    return "Både Og";
  }
  return decPts>0?"Ja":"Nej";
};

// Compute running accumulated totals across ALL sessions (sorted oldest first)
const allSorted=[...allSessions,{...session,finished:true}].sort((a,b)=>{
  if(a.season&&b.season){if(a.season!==b.season)return a.season-b.season;return a.eveningNum-b.eveningNum;}
  return a.id-b.id;
});

const accTotals={Bjørn:0,Kirk:0,Peter:0,Wehner:0};
let roundNum=0;
const rows=[];

for(const sess of allSorted){
  for(const r of (sess.rounds||[])){
    roundNum++;
    const pts={};
    ["Bjørn","Kirk","Peter","Wehner"].forEach(p=>{
      pts[p]=parseInt(r.points?.[p])||0;
      accTotals[p]+=pts[p];
    });
    const dato = sess.date&&!sess.date.includes("Sæson")?sess.date:"";
    rows.push([
      roundNum,
      null,
      dato||null,
      sess.season||null,
      sess.eveningNum||null,
      gameTypeLabel(r),
      r.declarer||null,
      r.partner==="selv"?r.declarer:r.partner||null,
      gåetHjem(r),
      pts.Bjørn, pts.Kirk, pts.Peter, pts.Wehner,
      accTotals.Bjørn, accTotals.Kirk, accTotals.Peter, accTotals.Wehner
    ]);
  }
}

const header=[[" ","Arena","Dato","Sæson","Aften","Melding","Melder","Makker","Gået Hjem","Bjørn","Kirk","Peter","Wehner","Akk_Bjørn","Akk_Kirk","Akk_Peter","Akk_Wehner"]];
const ws2=XLSX.utils.aoa_to_sheet([...header,...rows]);

// Column widths
ws2["!cols"]=[{wch:6},{wch:8},{wch:16},{wch:7},{wch:7},{wch:14},{wch:10},{wch:10},{wch:10},
  {wch:8},{wch:8},{wch:8},{wch:8},{wch:10},{wch:10},{wch:10},{wch:10}];

const wb2=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb2,ws2,"Samlet statistik");

const s=session.season;const e=session.eveningNum;
const filename=`Kortaften_Statistik_${s}_${e}.xlsx`;
// Return base64 data instead of auto-downloading (iframe blocks auto-download)
const wbout=XLSX.write(wb2,{bookType:"xlsx",type:"base64"});
return {filename, data:wbout};

// ── Global stats (full page) ───────────────────────────────────────────────
function GlobalStats({sessions, roundPtsFn}){
const allRounds=sessions.flatMap(s=>s.rounds).filter(r=>r.gameType&&r.declarer);
const total=allRounds.length;

if(sessions.length===0||total===0) return(
<div style={S.col}>
<h2 style={S.pageTitle}>Statistik</h2>
<p style={S.empty}>Ingen data endnu. Spil en kortaften først!</p>
</div>
);

// Rankings
const totals={};PLAYERS.forEach(p=>totals[p]=0);
sessions.forEach(s=>{
s.rounds.forEach(r=>{
const pts=roundPtsFn(r);
PLAYERS.forEach(p=>totals[p]+=(pts?pts[p]??0:0));
});
});
const ranked=PLAYERS.slice().sort((a,b)=>totals[b]-totals[a]).map((p,i)=>({name:p,total:totals[p],rank:i+1}));
const medals=[“🥇”,“🥈”,“🥉”,“4️⃣”];

// Type distribution
const typeCounts={};GAME_TYPES.forEach(g=>typeCounts[g.id]=0);
allRounds.forEach(r=>typeCounts[r.gameType]=(typeCounts[r.gameType]||0)+1);
const maxType=Math.max(…Object.values(typeCounts),1);

// Normalize name
const normName=name=>{
if(!name||name===“selv”) return null;
return PLAYERS.find(p=>p.toLowerCase()===name.toLowerCase())||null;
};

// Per-player stats
const playerStats={};
PLAYERS.forEach(p=>playerStats[p]={declared:0,won:0,partner:0,totalPts:totals[p],bestPts:-Infinity,worstPts:Infinity});
allRounds.forEach(r=>{
const dec=normName(r.declarer);
if(dec){
playerStats[dec].declared++;
const pts=roundPtsFn(r);
if(pts&&pts[dec]>0) playerStats[dec].won++;
if(pts){
playerStats[dec].bestPts=Math.max(playerStats[dec].bestPts,pts[dec]);
playerStats[dec].worstPts=Math.min(playerStats[dec].worstPts,pts[dec]);
}
}
const part=normName(r.partner);
if(part) playerStats[part].partner++;
});

// Sol stats
const solRounds=allRounds.filter(r=>[“sol”,“rensol”,“bord”].includes(r.gameType));
const solWins=solRounds.filter(r=>{const p=roundPtsFn(r);return p&&p[normName(r.declarer)]>0;}).length;

// Partner pairs
const partnerPairs={};
allRounds.forEach(r=>{
const dec=normName(r.declarer);const part=normName(r.partner);
if(dec&&part){const key=[dec,part].sort().join(” & “);partnerPairs[key]=(partnerPairs[key]||0)+1;}
});

return(
<div style={S.col}>
<h2 style={S.pageTitle}>Statistik</h2>
<p style={S.pageSub}>{sessions.length} aftenener · {total} runder</p>

function OvertrickLabel({taken, bid}){
if(taken===””||bid===””) return null;
const d=parseInt(taken)-parseInt(bid);
if(isNaN(d)) return null;
if(d>0) return <span style={{…S.bidLabel2,color:”#2c7a4b”}}>+{d} overtrick{d>1?“s”:””}</span>;
if(d<0) return <span style={{…S.bidLabel2,color:”#b5451b”}}>{d} stik for lidt</span>;
return <span style={{…S.bidLabel2,color:”#2c7a4b”}}>Præcis hjem ✓</span>;
}

function SolCheck({val, maxAllowed}){
if(val===””||val===undefined||val===null) return null;
const ok=Number(val)<=maxAllowed;
return <span style={{fontSize:“18px”}}>{ok?“✅”:“❌”}</span>;
}
